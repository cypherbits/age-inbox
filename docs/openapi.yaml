openapi: 3.0.3
info:
  title: Age Inbox API
  description: A REST API for creating Age-encrypted password-protected file inboxes. Supports encrypted metadata, subfolders on-the-fly, raw (locked) file access, and HTTP Range requests.
  version: 1.4.0
  license:
    name: MIT
servers:
  - url: http://127.0.0.1:3000
    description: Local development server
components:
  schemas:
    GenericRes:
      type: object
      properties:
        message:
          type: string
    ErrorRes:
      type: object
      properties:
        error:
          type: string
    VaultPermissions:
      type: object
      description: Granular permission flags controlling which operations are allowed on a vault.
      required:
        - allow_subfolders
        - allow_upload
        - allow_download
        - allow_list
        - allow_delete
        - allow_metadata
        - allow_lock_unlock
      properties:
        allow_subfolders:
          type: boolean
          description: Whether uploads to subdirectories are allowed.
        allow_upload:
          type: boolean
          description: Whether file uploads to the vault are allowed.
        allow_download:
          type: boolean
          description: Whether downloading and decrypting files is allowed (requires vault unlock).
        allow_list:
          type: boolean
          description: Whether listing vault files is allowed.
        allow_delete:
          type: boolean
          description: Whether file deletion is allowed.
        allow_metadata:
          type: boolean
          description: Whether accessing decrypted file metadata is allowed.
        allow_lock_unlock:
          type: boolean
          description: Whether lock and unlock operations are allowed.
    FileMetadata:
      type: object
      properties:
        filename:
          type: string
          nullable: true
        origin:
          type: string
          nullable: true
        filesize:
          type: integer
          format: uint64
          description: Size of the encrypted .age file on disk (in bytes).
      additionalProperties: true
    ListedFile:
      type: object
      properties:
        path:
          type: string
        filename:
          type: string
          nullable: true
        origin:
          type: string
          nullable: true
        size:
          type: integer
          format: uint64
          description: Size of the encrypted .age file on disk (in bytes).
      required:
        - path
        - size
    RawListedFile:
      type: object
      properties:
        path:
          type: string
        size:
          type: integer
          format: uint64
          description: Size of the encrypted .age file on disk (in bytes).
      required:
        - path
        - size
paths:
  /inbox:
    post:
      operationId: createInbox
      summary: Create a new vault/inbox
      description: Derives an Age identity from the provided password and creates a new vault on disk.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - password
              properties:
                name:
                  type: string
                  description: Unique name for the vault.
                password:
                  type: string
                  description: Password to derive the key using Argon2id.
                allow_subfolders:
                  type: boolean
                  description: Configuration to allow creation of folders on the fly during upload. Default is false.
      responses:
        '200':
          description: Vault successfully created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  public_key:
                    type: string
        '400':
          description: Invalid vault name.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
        '409':
          description: Vault already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
  /inbox/{name}/config:
    get:
      operationId: getVaultConfig
      summary: Get vault configuration
      description: Returns the public configuration of a vault, including all permission settings. Does not require authentication.
      security: []
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
          description: The name of the vault.
      responses:
        '200':
          description: Vault configuration retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  permissions:
                    $ref: '#/components/schemas/VaultPermissions'
        '400':
          description: Invalid vault name.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
        '404':
          description: Vault not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
  /inbox/{name}/upload:
    post:
      operationId: uploadFileRoot
      summary: Upload a file to a vault root
      description: Streams request body through Age encryption and saves to the vault root. Metadata must be sent in `multipart/form-data` fields to avoid HTTP header size limits. Generates a separate `.meta.age` encrypted file.
      security: []
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
          description: The name of the vault.
      requestBody:
        required: true
        description: Raw binary data or multipart payload. For metadata (`filename`, `origin`, `extended`) use multipart fields.
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
          'multipart/form-data':
            schema:
              type: object
              properties:
                filename:
                  type: string
                  description: The original filename.
                origin:
                  type: string
                  description: The source origin string.
                extended:
                  type: string
                  description: A JSON encoded object of additional external properties.
                file:
                  type: string
                  format: binary
                  description: The binary file to encrypt and save.
      responses:
        '200':
          description: File successfully encrypted and stored with metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericRes'
        '400':
          description: Invalid vault name or malformed multipart payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
        '403':
          description: Upload not permitted by vault configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
        '404':
          description: Vault not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
  /inbox/{name}/upload/{path}:
    post:
      operationId: uploadFilePath
      summary: Upload a file to a subfolder within a vault
      description: Encrypts stream directly to a nested folder inside the vault. Metadata must be sent in `multipart/form-data` fields to avoid HTTP header size limits. Fails if vault configuration disabled nested folders.
      security: []
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
          description: The name of the vault.
        - in: path
          name: path
          required: true
          schema:
            type: string
          description: The relative subfolder path.
      requestBody:
        required: true
        description: File payload stream or multipart form. Use multipart to include metadata fields.
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
          'multipart/form-data':
            schema:
              type: object
              properties:
                filename:
                  type: string
                origin:
                  type: string
                extended:
                  type: string
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: File stored within the specified bounded nested folder.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericRes'
        '400':
          description: Invalid vault name, subfolder path, or malformed multipart payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
        '403':
          description: Subfolders prohibited by configuration or upload not permitted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
        '404':
          description: Vault not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
  /inbox/{name}/unlock:
    post:
      operationId: unlockVault
      summary: Temporarily unlock a vault
      description: Validates the password and temporarily caches the derived Age private key in-memory for 1 hour.
      security: []
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
              properties:
                password:
                  type: string
      responses:
        '200':
          description: Vault unlocked successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericRes'
        '400':
          description: Invalid vault name.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
        '401':
          description: Invalid password/unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
        '403':
          description: Lock/unlock not permitted by vault configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
  /inbox/{name}/lock:
    post:
      operationId: lockVault
      summary: Immediately lock a vault
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Vault locked successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericRes'
        '400':
          description: Invalid vault name.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
        '403':
          description: Lock/unlock not permitted by vault configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
        '404':
          description: Vault not found or vault was not unlocked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
  /inbox/{name}/list:
    get:
      operationId: listFiles
      summary: List files in an unlocked vault (with metadata)
      description: Recursively retrieves encrypted file paths (excluding metadata sidecars). Decrypts metadata to include `filename`, `origin`, and reports the encrypted file `size` in bytes for each file. Requires the vault to be unlocked.
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
      responses:
        '200':
          description: JSON array of file items with metadata summary and file size.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ListedFile'
        '400':
          description: Invalid vault name.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
        '401':
          description: Vault is locked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
        '403':
          description: List not permitted by vault configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
  /inbox/{name}/download/{path}:
    get:
      operationId: downloadFile
      summary: Download and decrypt a file
      description: "Streams requested encrypted file back to the client decrypted. This endpoint only accepts file paths ending in `.age` (excluding `.meta.age`). Supports HTTP Range requests on the decrypted content. Returns `Accept-Ranges: bytes` header."
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
        - in: path
          name: path
          required: true
          schema:
            type: string
          description: Relative path for the file inside the vault.
        - in: header
          name: Range
          required: false
          schema:
            type: string
          description: 'HTTP Range header for partial content (e.g. `bytes=0-1023`).'
      responses:
        '200':
          description: The full decrypted binary file.
          headers:
            Accept-Ranges:
              schema:
                type: string
              description: 'Always `bytes`.'
            Content-Disposition:
              schema:
                type: string
              description: 'Attachment disposition with the resolved filename (e.g. `attachment; filename="report.pdf"`).'
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '206':
          description: Partial decrypted content for the requested byte range.
          headers:
            Content-Range:
              schema:
                type: string
              description: 'Byte range and total size (e.g. `bytes 0-1023/4096`).'
            Content-Length:
              schema:
                type: string
              description: 'Number of bytes in this partial response.'
            Accept-Ranges:
              schema:
                type: string
            Content-Disposition:
              schema:
                type: string
              description: 'Attachment disposition with the resolved filename.'
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid path or metadata sidecar path provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
        '401':
          description: Session locked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
        '403':
          description: Download not permitted by vault configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
        '404':
          description: File not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
        '416':
          description: Range not satisfiable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
  /inbox/{name}/metadata/{path}:
    get:
      operationId: downloadMetadata
      summary: Get decrypted metadata for a file
      description: Returns decrypted metadata from the sidecar `.meta.age` associated with an encrypted file path. Includes the encrypted file size on disk as `filesize`.
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
        - in: path
          name: path
          required: true
          schema:
            type: string
          description: Relative path to the encrypted file inside the vault (must end with `.age` and not `.meta.age`).
      responses:
        '200':
          description: Decrypted metadata as JSON, including filesize.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileMetadata'
        '400':
          description: Invalid path.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
        '401':
          description: Session locked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
        '403':
          description: Metadata access not permitted by vault configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
        '404':
          description: Metadata sidecar not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
  /inbox/{name}/delete/{path}:
    delete:
      operationId: deleteFile
      summary: Delete an encrypted file (requires unlock)
      description: Deletes the specified encrypted `.age` file and its associated `.meta.age` sidecar (if it exists). Requires the vault to be unlocked.
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
          description: The name of the vault.
        - in: path
          name: path
          required: true
          schema:
            type: string
          description: Relative path to the encrypted file inside the vault.
      responses:
        '200':
          description: File (and metadata sidecar if present) deleted successfully.
        '400':
          description: Invalid name or path.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
        '403':
          description: Vault is locked or delete not permitted by vault configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
        '404':
          description: Vault or file not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
  /inbox/{name}/raw/list:
    get:
      operationId: listFilesRaw
      summary: List files in a vault (no unlock required)
      description: Recursively retrieves encrypted file paths and their sizes on disk. Does NOT decrypt metadata — returns only `path` and `size`. Works regardless of whether the vault is locked or unlocked.
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
      responses:
        '200':
          description: JSON array of raw file items with path and size.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RawListedFile'
        '400':
          description: Invalid vault name.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
        '403':
          description: List not permitted by vault configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
        '404':
          description: Vault not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
  /inbox/{name}/raw/download/{path}:
    get:
      operationId: downloadFileRaw
      summary: Download an encrypted file without decryption
      description: Streams the encrypted `.age` file as-is without decryption. Works regardless of vault lock state. Supports HTTP Range requests for partial content with efficient seeking.
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
        - in: path
          name: path
          required: true
          schema:
            type: string
          description: Relative path to the encrypted file inside the vault (must end with `.age`, not `.meta.age`).
        - in: header
          name: Range
          required: false
          schema:
            type: string
          description: 'HTTP Range header for partial content (e.g. `bytes=0-1023`).'
      responses:
        '200':
          description: The encrypted binary file as-is.
          headers:
            Content-Length:
              schema:
                type: string
              description: 'Total size of the encrypted file in bytes.'
            Accept-Ranges:
              schema:
                type: string
              description: 'Always `bytes`.'
            Content-Disposition:
              schema:
                type: string
              description: 'Attachment disposition with the `.age` filename (e.g. `attachment; filename="upload_123.age"`).'
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '206':
          description: Partial encrypted content for the requested byte range.
          headers:
            Content-Range:
              schema:
                type: string
              description: 'Byte range and total size (e.g. `bytes 0-1023/4096`).'
            Content-Length:
              schema:
                type: string
              description: 'Number of bytes in this partial response.'
            Accept-Ranges:
              schema:
                type: string
            Content-Disposition:
              schema:
                type: string
              description: 'Attachment disposition with the `.age` filename.'
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid path or not an .age file.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
        '403':
          description: Download not permitted by vault configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
        '404':
          description: Vault or file not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
  /inbox/{name}/raw/delete/{path}:
    delete:
      operationId: deleteFileRaw
      summary: Delete an encrypted file without requiring unlock
      description: Deletes the specified encrypted `.age` file and its associated `.meta.age` sidecar (if it exists). Works regardless of vault lock state.
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
          description: The name of the vault.
        - in: path
          name: path
          required: true
          schema:
            type: string
          description: Relative path to the encrypted file inside the vault (must end with `.age`, not `.meta.age`).
      responses:
        '200':
          description: File (and metadata sidecar if present) deleted successfully.
        '400':
          description: Invalid name or path.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
        '403':
          description: Delete not permitted by vault configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
        '404':
          description: Vault or file not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorRes'
