openapi: 3.0.3
info:
  title: Age Inbox API
  description: A REST API for creating Age-encrypted password-protected file inboxes. Now supports encrypted metadata and subfolders on-the-fly.
  version: 1.2.0
  license:
    name: MIT
servers:
  - url: http://127.0.0.1:3000
    description: Local development server
components:
  schemas:
    GenericRes:
      type: object
      properties:
        message:
          type: string
    ErrorRes:
      type: object
      properties:
        error:
          type: string
    FileMetadata:
      type: object
      properties:
        filename:
          type: string
          nullable: true
        origin:
          type: string
          nullable: true
      additionalProperties: true
    ListedFile:
      type: object
      properties:
        path:
          type: string
        filename:
          type: string
          nullable: true
        origin:
          type: string
          nullable: true
      required:
        - path
paths:
  /inbox:
    post:
      operationId: createInbox
      summary: Create a new vault/inbox
      description: Derives an Age identity from the provided password and creates a new vault on disk.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - password
              properties:
                name:
                  type: string
                  description: Unique name for the vault.
                password:
                  type: string
                  description: Password to derive the key using Argon2id.
                allow_subfolders:
                  type: boolean
                  description: Configuration to allow creation of folders on the fly during upload. Default is false.
      responses:
        '200':
          description: Vault successfully created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  public_key:
                    type: string
        '400':
          description: Invalid vault name.
        '409':
          description: Vault already exists.
  /inbox/{name}/upload:
    post:
      operationId: uploadFileRoot
      summary: Upload a file to a vault root
      description: Streams request body through Age encryption and saves to the vault root. Metadata must be sent in `multipart/form-data` fields to avoid HTTP header size limits. Generates a separate `.meta.age` encrypted file.
      security: []
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
          description: The name of the vault.
      requestBody:
        required: true
        description: Raw binary data or multipart payload. For metadata (`filename`, `origin`, `extended`) use multipart fields.
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
          'multipart/form-data':
            schema:
              type: object
              properties:
                filename:
                  type: string
                  description: The original filename.
                origin:
                  type: string
                  description: The source origin string.
                extended:
                  type: string
                  description: A JSON encoded object of additional external properties.
                file:
                  type: string
                  format: binary
                  description: The binary file to encrypt and save.
      responses:
        '200':
          description: File successfully encrypted and stored with metadata.
  /inbox/{name}/upload/{path}:
    post:
      operationId: uploadFilePath
      summary: Upload a file to a subfolder within a vault
      description: Encrypts stream directly to a nested folder inside the vault. Metadata must be sent in `multipart/form-data` fields to avoid HTTP header size limits. Fails if vault configuration disabled nested folders.
      security: []
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
          description: The name of the vault.
        - in: path
          name: path
          required: true
          schema:
            type: string
          description: The relative subfolder path.
      requestBody:
        required: true
        description: File payload stream or multipart form. Use multipart to include metadata fields.
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
          'multipart/form-data':
            schema:
              type: object
              properties:
                filename:
                  type: string
                origin:
                  type: string
                extended:
                  type: string
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: File stored within the specified bounded nested folder.
        '403':
          description: Subfolders prohibited by configuration.
  /inbox/{name}/unlock:
    post:
      operationId: unlockVault
      summary: Temporarily unlock a vault
      description: Validates the password and temporarily caches the derived Age private key in-memory for 1 hour.
      security: []
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
              properties:
                password:
                  type: string
      responses:
        '200':
          description: Vault unlocked successfully.
        '401':
          description: Invalid password/unauthorized.
  /inbox/{name}/lock:
    post:
      operationId: lockVault
      summary: Immediately lock a vault
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Vault locked.
  /inbox/{name}/list:
    get:
      operationId: listFiles
      summary: List files in an unlocked vault
      description: Recursively retrieves encrypted file paths (excluding metadata sidecars). If metadata is available, includes only `filename` and `origin` for each file.
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
      responses:
        '200':
          description: JSON array of file items with optional metadata summary.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ListedFile'
        '401':
          description: Vault is locked.
  /inbox/{name}/download/{path}:
    get:
      operationId: downloadFile
      summary: Download and decrypt a file
      description: Streams requested encrypted file back to the client decrypted. This endpoint only accepts file paths ending in `.age` (excluding `.meta.age`).
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
        - in: path
          name: path
          required: true
          schema:
            type: string
          description: Relative path for the file inside the vault.
      responses:
        '200':
          description: The decrypted binary file.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid path or metadata sidecar path provided.
        '401':
          description: Session locked.
  /inbox/{name}/metadata/{path}:
    get:
      operationId: downloadMetadata
      summary: Get decrypted metadata for a file
      description: Returns decrypted metadata from the sidecar `.meta.age` associated with an encrypted file path.
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
        - in: path
          name: path
          required: true
          schema:
            type: string
          description: Relative path to the encrypted file inside the vault (must end with `.age` and not `.meta.age`).
      responses:
        '200':
          description: Decrypted metadata as JSON.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileMetadata'
        '400':
          description: Invalid path.
        '401':
          description: Session locked.
        '404':
          description: Metadata sidecar not found.
